spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/yunyu?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:yunyu}
    password: ${SPRING_DATASOURCE_PASSWORD:yunyu123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    default-property-inclusion: non_null

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

yunyu:
  security:
    jwt:
      secret: ${YUNYU_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      expire-days: ${YUNYU_JWT_EXPIRE_DAYS:7}
